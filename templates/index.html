<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-box {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .btn-start {
            background: #4facfe;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn-start:hover {
            background: #00c6ff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="main-box">
        <h1>🎓 Student Performance Prediction</h1>

        <p>
            Predict student maths scores based on various factors like gender, education, and test preparation.
        </p>

        <!-- 🔥 Button to redirect -->
        <a href="{{ url_for('predict_datapoint') }}">
            <button class="btn btn-primary btn-start">
                🚀 Start Prediction
            </button>
        </a>
    </div>

</body>
</html>
